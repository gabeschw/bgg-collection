# Per-game overrides, keyed by BoardGameGeek object id.
#
# Two name fields, so the two outputs can differ where it matters:
#   name  = display name used EVERYWHERE (collection report + reference card).
#           Use it to fix a name — e.g. restore the canonical English title
#           over a localized edition, or drop a series prefix.
#   short = name used ONLY on the reference card, which must fit one line.
#           The collection report (a wide table) keeps the full name.
#
# The name otherwise defaults to the owned edition's name (from the collection
# item); trailing "(...)" parentheticals are trimmed automatically.

# --- Name fixes (apply everywhere) ---

[overrides."42"]      # owned edition: Euphrat & Tigris
name = "Tigris & Euphrates"

[overrides."277597"]  # owned edition: Luiaard
name = "Fast Sloths"

[overrides."354"]     # owned edition: Sticheln
name = "Stick 'Em"

[overrides."811"]     # owned edition: Deluxe Rummikub
name = "Rummikub"

# --- Card-only shortenings (table keeps the full name) ---

[overrides."130176"]  # Tales & Games: The Hare & the Tortoise
short = "The Hare & the Tortoise"

[overrides."258210"]  # Blitzkrieg!: World War Two in 20 Minutes
short = "Blitzkrieg!"

[overrides."284083"]  # The Crew: The Quest for Planet Nine
short = "The Crew"

[overrides."338957"]  # Caesar!: Seize Rome in 20 Minutes!
short = "Caesar!"

[overrides."191300"]  # Archaeology: The New Expedition
short = "Archaeology"

[overrides."156129"]  # Deception: Murder in Hong Kong
short = "Deception"

[overrides."319966"]  # The King Is Dead: Second Edition
short = "The King Is Dead"
