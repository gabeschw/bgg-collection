
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    body {
        margin-left: 50px;
        font-family: 'Geneva', sans-serif;
    }
    h1 {
        text-align: right;
        font-size: 0.9em;
        font-weight: normal;
    }
    h2 {
        margin: 25px 0px 0px 0px;
        font-size: 1.1em;
        color: #2b3e41;
    }
    table {
        border-collapse: collapse;
        margin: 5px 0;
        font-size: 0.7em;
        color: #000000;
        width: 800px;
        border-width: 1px;
        border-style: solid;
        border-color: #d8e3e5;
    }
    table thead tr {
        background-color: #83a0a0;
        color: #ffffff;
    }
    table th,
    table td {
        padding: 3px;
        border-width: 0;
        text-align: left;
        font-weight: normal;
    }
    table tbody tr {
        border-width: 0;
    }
    table tbody tr:nth-of-type(even) {
        background-color: #eff3f3;
    }
    </style>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>BGG Printable Collection</title>
</head>
<body>

    <h1><strong>{{ bgg_username }} / </strong>Last Update: {{ last_update_date }}</h1>

    {% for section in sections %}
        {% if section.page_break %}
            <p style="page-break-before: always"></p>
        {% endif %}
        <h2>{{ section.title }}</h2>
        {{ section.table | safe }}
    {% endfor %}

</body>
</html>
